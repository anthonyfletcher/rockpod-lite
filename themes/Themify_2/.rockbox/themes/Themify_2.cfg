wps: /.rockbox/wps/Themify_2.wps
sbs: /.rockbox/wps/Themify_2.sbs
font: /.rockbox/fonts/22-LeagueSpartan-Regular.fnt
font bold: /.rockbox/fonts/22-LeagueSpartan-Bold.fnt
#
show icons: on
scrollbar: right
battery display: numeric
time format: 12hour
#
foreground color: 00fbd6
background color: 000c21
#
scroll speed: 14
scroll delay: 1500
scroll step: 1
#
dialog box border width: 2
dialog box margin: 10
dialog button border width: 2
dialog button border radius: 3
dialog colours: on
dialog box foreground: 000C21
dialog box background: E1F0EE
dialog box border colour: 000C21
dialog button foreground: 000C21
dialog button background: B4C2C5
dialog button border colour: FFFFFF
dialog button foreground selected: 000C21
dialog button background selected: B4C2C5
dialog button border colour selected: 000C21

# Database album rows: tall enough for the 48px cover the %La tag draws. 0 = off.
database album art: on
database artist art: on
database art row height: 52