# Shipped as .rockbox/config.cfg so Themify_2 is fully active from first boot,
# without the user having to select it from the Theme menu manually.
# Mirrors themes/Themify_2/.rockbox/themes/Themify_2.cfg's settings, using the
# bare-name convention (apps/settings_list.c's DEFAULT_WPSN,AME/DEFAULT_SBSNAME
# style) rather than that file's full-path form.
wps: Themify_2
sbs: Themify_2
font: 22-LeagueSpartan-Regular
font bold: 22-LeagueSpartan-Bold
backdrop: -
show icons: on
scrollbar: right
battery display: numeric
time format: 12hour
foreground color: e1f0ee
background color: 000c21
scroll speed: 14
scroll delay: 1500
scroll step: 1

# Modal dialog chrome (splash / yes-no / text input). See apps/gui/dialog.h.
# Metrics always apply. Colours apply only when "dialog colours" is on; with it
# off, every dialog colour is inherited from the theme's own foreground and
# background above, which is the stock look.
# Note: "dialog box margin" does not affect splashes -- the popup pins its own
# padding, because its word-wrap layout is built around it.
dialog box border width: 2
dialog box border radius: 6
dialog box margin: 10
dialog button border width: 2
dialog button border radius: 3
dialog colours: on
dialog box foreground: 000C21
dialog box background: E1F0EE
dialog box border colour: FFFFFF
dialog button foreground: 000C21
dialog button background: AFCDD1
dialog button border colour: e1f0ee
dialog button foreground selected: 000C21
dialog button background selected: AFCDD1
dialog button border colour selected: 000C21
