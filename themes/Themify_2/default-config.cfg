# Shipped as .rockbox/config.cfg so Themify_2 is fully active from first boot,
# without the user having to select it from the Theme menu manually.
# Mirrors themes/Themify_2/.rockbox/themes/Themify_2.cfg's settings, using the
# bare-name convention (apps/settings_list.c's DEFAULT_WPSN,AME/DEFAULT_SBSNAME
# style) rather than that file's full-path form.
wps: Themify_2
sbs: Themify_2
font: 22-LeagueSpartan-Regular
font bold: 22-LeagueSpartan-Bold
backdrop: -
show icons: on
scrollbar: right
battery display: numeric
time format: 12hour
foreground color: e1f0ee
background color: 000c21
scroll speed: 14
scroll delay: 1500
scroll step: 1
